# Lint and test the package on each push / PR against main.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      PDM_IGNORE_SAVED_PYTHON: 1
      PDM_NON_INTERACTIVE: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PDM
        run: |
          python -m pip install pdm
          pdm use python
          pdm info -v

      - name: Install dependencies
        run: pdm install -v

      - name: Ruff (lint)
        run: pdm run ruff check src tests

      - name: Ruff (format check)
        run: pdm run ruff format --check src tests

      - name: Pyright
        run: pdm run pyright src

      - name: ShellCheck (bin scripts)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./bin

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.13", "3.14"]
    env:
      PYTHONDEVMODE: 1
      PDM_IGNORE_SAVED_PYTHON: 1
      PDM_NON_INTERACTIVE: 1

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set Variables
        id: set_variables
        shell: bash
        run: |
          echo "PY=$(python -c 'import hashlib, sys;print(hashlib.sha256(sys.version.encode()+sys.executable.encode()).hexdigest())')" >> $GITHUB_OUTPUT
          echo "PIP_CACHE=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.set_variables.outputs.PIP_CACHE }}
          key: ${{ runner.os }}-pip-${{ steps.set_variables.outputs.PY }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-1-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pdm.lock') }}
          restore-keys: |
            venv-1-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install PDM
        run: |
          python -m pip install pdm
          pdm use python
          pdm info -v

      - name: Install dependencies
        run: |
          pdm use -f .venv
          pdm install -v

      - name: Pytest
        run: pdm run pytest
