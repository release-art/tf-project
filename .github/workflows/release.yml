name: Release
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

jobs:
  start:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Start release
        run: echo "Starting release process"

  publish-package:
    needs: start
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Required for PyPI OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install pdm
      - name: Build packages
        run: pdm build
      # - name: Publish distribution to Test PyPI  # <-- Unable to publish to test pypi, as the project name is taken there
      #   run: |
      #     pdm publish --no-build
      #   env:
      #     PDM_PUBLISH_REPO: 'https://test.pypi.org/legacy/'
      - name: Publish distribution to PRODUCTION PyPI
        run: |
          pdm publish --no-build

  gh-release:
    needs:
      - publish-package
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to create a GitHub Release
    steps:
      - uses: actions/checkout@v6
      - name: Read version
        id: version
        run: |
          v=$(python -c "import re,sys; t=open('src/tf_project/__version__.py').read(); m=re.search(r'\"(.*?)\"', t); sys.stdout.write(m.group(1))")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python <<'PY' > release-notes.md
          import pathlib, re, sys
          text = pathlib.Path('CHANGELOG.md').read_text()
          m = re.search(r'## \[Unreleased\]\s*\n(.*?)(?=\n## )', text, re.DOTALL)
          notes = (m.group(1).strip() if m else '').strip()
          sys.stdout.write(notes or '_No changelog entries for this release._')
          PY
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
            exit 0
          fi
          gh release create "$tag" \
            --title "$tag" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}"

  bump-version:
    needs:
      - publish-package
      - gh-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_ART_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.RELEASE_ART_WORKFLOW_APP_PK }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install pdm
          pdm self add pdm-bump
      - name: Bump version
        run: |
          pdm bump patch
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: ${{ steps.app-token.outputs.app-slug }}[bot]
          commit_user_email: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          commit_message: |-
            [ci skip] Bump version for next release


            skip-checks: true
          create_branch: false
